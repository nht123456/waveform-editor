<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>波形图编辑器</title>
  <link rel="stylesheet" href="styles/main.css?v=8">
</head>
<body>
  <div class="app-container">
    <!-- 工具栏 -->
    <div class="toolbar" id="toolbar">
      <div class="toolbar-group">
        <button class="toolbar-btn" id="addSignalBtn" title="添加信号">+ 信号</button>
        <button class="toolbar-btn" id="addClockBtn" title="添加时钟">+ 时钟</button>
      </div>
      <div class="toolbar-group">
        <button class="toolbar-btn icon-btn" id="undoBtn" title="撤销 (Ctrl+Z)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10h10a5 5 0 0 1 5 5v2"/>
            <polyline points="8 14 3 10 8 6"/>
          </svg>
        </button>
        <button class="toolbar-btn icon-btn" id="redoBtn" title="重做 (Ctrl+Y)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10H11a5 5 0 0 0-5 5v2"/>
            <polyline points="16 14 21 10 16 6"/>
          </svg>
        </button>
      </div>
      <div class="toolbar-group">
        <button class="toolbar-btn" id="openProjectBtn" title="打开项目 (.wfp)">打开</button>
        <button class="toolbar-btn" id="saveProjectBtn" title="保存项目 (.wfp)">保存</button>
        <button class="toolbar-btn" id="exportPngBtn" title="导出 PNG">导出 PNG</button>
        <button class="toolbar-btn" id="exportJsonBtn" title="导出 JSON">导出 JSON</button>
        <button class="toolbar-btn" id="copyToClipboardBtn" title="复制图像到剪贴板">复制图像</button>
        <button class="toolbar-btn" id="saveTemplateBtn" title="保存当前波形为模板，新建时自动使用">存为模板</button>
        <button class="toolbar-btn" id="resetTemplateBtn" title="恢复默认模板">重置模板</button>
        <button class="toolbar-btn" id="exportStandaloneBtn" title="导出含当前波形的独立HTML，发给别人可直接使用">导出独立版</button>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
      <!-- 信号列表面板 -->
      <div class="signal-panel" id="signalPanel">
        <div class="signal-panel-header">信号列表</div>
        <div class="signal-list" id="signalList">
          <!-- 信号项动态生成 -->
        </div>
      </div>

      <!-- 可拖拽分隔线 -->
      <div class="panel-resizer" id="panelResizer"></div>

      <!-- 波形编辑区 -->
      <div class="waveform-container">
        <div class="waveform-canvas" id="waveformCanvas">
          <svg class="waveform-svg" id="waveformSvg">
            <!-- 波形动态生成 -->
          </svg>
        </div>
      </div>

      <!-- 属性面板 -->
      <div class="property-panel" id="propertyPanel" style="display: none;">
        <div class="property-panel-header">
        <span class="property-panel-title">属性</span>
        <button class="property-panel-close" id="propertyPanelClose" title="关闭">&times;</button>
      </div>
        <div id="propertyContent">
        </div>
      </div>
    </div>

    <!-- Sheet 标签栏 -->
    <div class="sheet-tabs" id="sheetTabs">
      <button class="sheet-tab-add" id="addSheetBtn" title="新建波形图">+</button>
      <div class="sheet-tabs-list" id="sheetTabsList">
        <!-- Sheet 标签动态生成 -->
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js?v=264"></script>
</body>
</html>
